<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>一万小时计划本 · 100 PAGES × 100 HOURS</title>
<style>
  :root{
    --paper:#fafaf7;
    --ink:#2a2a2a;
    --ink-soft:#6b6b6b;
    --line:#d8d6cf;
    --line-soft:#e8e6df;
    --grid:#eceae3;
    --accent:#2a2a2a;
    --done-bg:#2a2a2a;
    --done-fg:#fafaf7;
    --hover:#f0ede4;
    --bookmark:#b07a4a;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:#e8e6df;color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Helvetica Neue",sans-serif;
    line-height:1.5; -webkit-font-smoothing:antialiased;}

  /* ===== Top Bar ===== */
  .topbar{
    position:sticky;top:0;z-index:50;background:rgba(232,230,223,.92);
    backdrop-filter:saturate(140%) blur(8px);
    border-bottom:1px solid #cfcdc6;padding:12px 22px;
    display:flex;align-items:center;gap:14px;flex-wrap:wrap;
  }
  .brand{font-weight:800;letter-spacing:.5px;font-size:15px}
  .brand small{display:block;font-size:10px;letter-spacing:3px;color:var(--ink-soft);font-weight:500;margin-top:2px}
  .topbar .spacer{flex:1}
  .btn{
    background:var(--ink);color:var(--paper);border:none;
    padding:8px 14px;border-radius:4px;font-size:12px;font-weight:600;
    cursor:pointer;letter-spacing:.5px;font-family:inherit;
    transition:opacity .15s, transform .1s;
  }
  .btn:hover{opacity:.85}
  .btn:active{transform:translateY(1px)}
  .btn.ghost{background:transparent;color:var(--ink);border:1px solid #b8b5ad}
  .btn.ghost:hover{background:#dcd9d0;opacity:1}
  .btn.danger{background:transparent;color:#a14040;border:1px solid #d4b5b5}
  .btn.danger:hover{background:#f0dada}

  /* ===== Overall progress ===== */
  .overall{
    max-width:1100px;margin:18px auto 6px;padding:0 22px;
    display:flex;align-items:center;gap:18px;flex-wrap:wrap;
  }
  .overall .label{font-size:11px;letter-spacing:2px;color:var(--ink-soft);text-transform:uppercase;font-weight:600}
  .overall .nums{font-size:13px;color:var(--ink);font-variant-numeric:tabular-nums}
  .overall .nums b{font-size:18px;font-weight:800}
  .overall .barwrap{flex:1;min-width:200px;height:8px;background:#dcd9d0;border-radius:99px;overflow:hidden;border:1px solid #cfcdc6}
  .overall .barfill{height:100%;background:linear-gradient(90deg,#3a3a3a,#1a1a1a);width:0%;transition:width .5s}

  /* ===== Pages wrapper ===== */
  .pages{max-width:1100px;margin:0 auto;padding:18px 22px 80px}

  /* ===== Page (一张内页) ===== */
  .page{
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:6px;
    box-shadow:0 8px 28px rgba(60,55,40,.10), 0 1px 0 #fff inset;
    padding:34px 38px 38px;
    margin-bottom:30px;
    position:relative;
    /* Grid paper background */
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size:22px 22px;
    background-position:0 0;
  }
  .page-header{
    display:flex;align-items:baseline;gap:14px;
    border-bottom:2px solid var(--ink);padding-bottom:8px;margin-bottom:14px;
    background:var(--paper);
  }
  .page-title{font-size:18px;font-weight:800;letter-spacing:1.5px;margin:0}
  .page-title .num{color:var(--bookmark)}
  .page-motto{margin-left:auto;font-size:11px;letter-spacing:3px;color:var(--ink-soft);font-weight:600}
  .page-actions{display:flex;gap:6px}
  .page-actions button{
    background:transparent;border:none;color:var(--ink-soft);cursor:pointer;font-size:14px;
    padding:2px 8px;border-radius:3px;font-family:inherit;
  }
  .page-actions button:hover{background:var(--hover);color:var(--ink)}

  /* ===== 100 cells grid ===== */
  .cells{
    display:grid;grid-template-columns:repeat(25,1fr);
    gap:0;border:1px solid var(--line);background:var(--paper);
    margin-bottom:18px;
  }
  .cell{
    aspect-ratio:1;display:flex;align-items:center;justify-content:center;
    font-size:11px;color:var(--ink-soft);cursor:pointer;
    border-right:1px solid var(--line-soft);
    border-bottom:1px solid var(--line-soft);
    font-variant-numeric:tabular-nums;
    user-select:none;
    transition:background .12s;
    position:relative;
  }
  .cell:nth-child(25n){border-right:none}
  .cell:nth-last-child(-n+25){border-bottom:none}
  .cell:hover{background:var(--hover)}
  .cell.done{
    background:var(--done-bg);color:var(--done-fg);font-weight:700;
  }
  .cell.done::after{
    content:"✓";position:absolute;font-size:8px;top:1px;right:3px;opacity:.6;
  }
  @media(max-width:680px){
    .cells{grid-template-columns:repeat(10,1fr)}
    .cell:nth-child(25n){border-right:1px solid var(--line-soft)}
    .cell:nth-child(10n){border-right:none}
    .cell:nth-last-child(-n+25){border-bottom:1px solid var(--line-soft)}
    .cell:nth-last-child(-n+10){border-bottom:none}
  }

  /* ===== Form area ===== */
  .form-grid{
    display:grid;grid-template-columns:1fr 1.3fr;gap:0;
    border:1px solid var(--line);background:var(--paper);
  }
  @media(max-width:760px){.form-grid{grid-template-columns:1fr}}
  .form-left, .form-right{padding:0}
  .field{
    display:grid;grid-template-columns:110px 1fr;align-items:stretch;
    border-bottom:1px solid var(--line-soft);min-height:38px;
  }
  .field:last-child{border-bottom:none}
  .field .lbl{
    background:#f3f1e9;padding:8px 12px;font-size:10px;letter-spacing:2px;
    color:var(--ink);font-weight:700;display:flex;align-items:center;
    border-right:1px solid var(--line-soft);
  }
  .field input, .field textarea{
    border:none;background:transparent;padding:8px 12px;font-size:14px;
    color:var(--ink);font-family:inherit;outline:none;width:100%;resize:none;
  }
  .field input:focus, .field textarea:focus{background:#fff8e8}
  .field.tall{min-height:120px}
  .field.tall .lbl{align-items:flex-start;padding-top:10px}
  .field.tall textarea{min-height:120px;line-height:1.6}

  /* Plan section (full width below) */
  .plan-section{
    margin-top:0;border:1px solid var(--line);border-top:none;background:var(--paper);
  }
  .plan-section .field{grid-template-columns:110px 1fr}
  .plan-section textarea{min-height:260px;line-height:28px;
    /* lined paper effect */
    background-image:repeating-linear-gradient(transparent 0, transparent 27px, #e8e6df 27px, #e8e6df 28px);
    padding:0 12px;
  }
  .plan-section .field .lbl{align-items:flex-start;padding-top:8px}

  /* Page meta footer */
  .page-foot{
    margin-top:14px;display:flex;justify-content:space-between;align-items:center;
    font-size:11px;color:var(--ink-soft);letter-spacing:1px;
  }
  .page-foot .progress-text b{color:var(--ink);font-size:14px;font-weight:800}

  /* Add page button */
  .add-page{
    display:block;width:100%;padding:18px;background:transparent;
    border:2px dashed #b8b5ad;border-radius:6px;color:var(--ink-soft);
    font-size:14px;font-weight:600;cursor:pointer;letter-spacing:1px;
    font-family:inherit;transition:all .15s;
  }
  .add-page:hover{border-color:var(--ink);color:var(--ink);background:rgba(255,255,255,.4)}

  /* ===== Cover ===== */
  .cover{
    background:var(--paper);border:1px solid var(--line);border-radius:6px;
    box-shadow:0 8px 28px rgba(60,55,40,.10);
    padding:48px 38px;margin-bottom:30px;text-align:center;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size:22px 22px;
  }
  .cover h1{font-size:42px;margin:0 0 6px;letter-spacing:8px;font-weight:800}
  .cover .sub{font-size:11px;letter-spacing:6px;color:var(--ink-soft);font-weight:600;margin-bottom:26px}
  .cover .quote{max-width:560px;margin:0 auto 28px;font-size:13px;color:var(--ink-soft);font-style:italic;line-height:1.8}
  .cover .cover-fields{
    display:grid;grid-template-columns:1fr 1fr;gap:0;max-width:560px;margin:0 auto;
    border:1px solid var(--line);background:var(--paper);text-align:left;
  }
  .cover .cover-fields .field{border-right:1px solid var(--line-soft)}
  .cover .cover-fields .field:nth-child(2n){border-right:none}
  .cover .cover-fields .field:nth-last-child(-n+2){border-bottom:none}

  /* Toast */
  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
    background:var(--ink);color:var(--paper);padding:10px 20px;border-radius:4px;
    font-size:13px;opacity:0;transition:all .25s;z-index:99;letter-spacing:1px;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* Print */
  @media print{
    body{background:#fff}
    .topbar,.overall,.add-page,.page-actions{display:none !important}
    .pages{padding:0;max-width:none}
    .page{box-shadow:none;border:1px solid #999;page-break-after:always;margin:0}
    .cover{page-break-after:always}
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">一万小时计划本<small>10,000 HOURS · 100 PAGES</small></div>
  <div class="spacer"></div>
  <button class="btn ghost" onclick="doPrint()">🖨 打印</button>
  <button class="btn ghost" onclick="exportData()">导出</button>
  <button class="btn ghost" onclick="document.getElementById('importFile').click()">导入</button>
  <input id="importFile" type="file" accept=".json" style="display:none" onchange="importData(event)" />
  <button class="btn danger" onclick="resetAll()">重置</button>
</div>

<div class="overall">
  <div class="label">TOTAL PROGRESS</div>
  <div class="nums"><b id="totalDone">0</b> / 10,000 小时</div>
  <div class="barwrap"><div class="barfill" id="totalBar"></div></div>
  <div class="nums"><span id="totalPct">0.00%</span></div>
</div>

<div class="pages" id="pages"></div>

<button class="add-page" onclick="addPage()">+ 添加新的 100 小时计划页</button>

<div class="toast" id="toast"></div>

<template id="page-tpl">
  <div class="page" data-pid="">
    <div class="page-header">
      <h2 class="page-title">第 <span class="num"></span> 个 100 小时 · <span style="font-weight:600;letter-spacing:2px">100-HOUR PLAN</span></h2>
      <div class="page-motto">PERSISTENCE IS VICTORY</div>
      <div class="page-actions">
        <button title="复制此页设置" onclick="dupPage(this)">⎘</button>
        <button title="删除此页" onclick="delPage(this)">✕</button>
      </div>
    </div>

    <div class="cells"></div>

    <div class="form-grid">
      <div class="form-left">
        <div class="field"><div class="lbl">START DATE</div><input type="date" data-k="startDate"/></div>
        <div class="field"><div class="lbl">END DATE</div><input type="date" data-k="endDate"/></div>
        <div class="field"><div class="lbl">GOAL</div><input type="text" data-k="goal" placeholder="本阶段目标…"/></div>
        <div class="field"><div class="lbl">REWARDS</div><input type="text" data-k="rewards" placeholder="完成后奖励自己…"/></div>
      </div>
      <div class="form-right">
        <div class="field tall"><div class="lbl">SUMMARY</div><textarea data-k="summary" placeholder="阶段总结、收获、卡点…"></textarea></div>
      </div>
    </div>

    <div class="plan-section">
      <div class="field tall"><div class="lbl">PLAN</div><textarea data-k="plan" placeholder="详细计划：练什么、怎么练、节奏安排…"></textarea></div>
    </div>

    <div class="page-foot">
      <div>点击数字方块标记完成的每一小时</div>
      <div class="progress-text"><b class="page-done">0</b> / 100 小时</div>
    </div>
  </div>
</template>

<script>
const KEY = "tenK_journal_pages_v2";
const TOTAL_PAGES_TARGET = 100;
let state = { pages: [], cover:{} };

// ---------- storage ----------
function load(){
  try{
    const raw = localStorage.getItem(KEY);
    if(raw){ state = JSON.parse(raw); }
  }catch(e){ console.warn('localStorage 读取失败（沙盒预览中常见）：', e); }
  if(!state.pages || !state.pages.length){
    state.pages = [ newPage() ];
  }
}
function save(){
  try{ localStorage.setItem(KEY, JSON.stringify(state)); }
  catch(e){ console.warn('localStorage 不可用（可能在沙盒预览中）：', e); }
}
function newPage(){
  return {
    id: "p_"+Date.now()+"_"+Math.random().toString(36).slice(2,6),
    cells: Array(100).fill(false),
    startDate:"", endDate:"", goal:"", rewards:"", summary:"", plan:""
  };
}

// ---------- render ----------
function render(){
  const wrap = document.getElementById('pages');
  wrap.innerHTML = "";
  const tpl = document.getElementById('page-tpl');
  state.pages.forEach((p, idx)=>{
    const node = tpl.content.firstElementChild.cloneNode(true);
    node.dataset.pid = p.id;
    node.querySelector('.num').textContent = String(idx+1).padStart(2,'0');

    // cells
    const cellsWrap = node.querySelector('.cells');
    let frag = "";
    for(let i=0;i<100;i++){
      frag += `<div class="cell ${p.cells[i]?'done':''}" data-i="${i}">${i+1}</div>`;
    }
    cellsWrap.innerHTML = frag;
    cellsWrap.addEventListener('click', e=>{
      const c = e.target.closest('.cell'); if(!c) return;
      const i = +c.dataset.i;
      p.cells[i] = !p.cells[i];
      c.classList.toggle('done', p.cells[i]);
      updatePageFoot(node, p);
      updateTotal();
      save();
    });

    // form fields
    node.querySelectorAll('[data-k]').forEach(el=>{
      el.value = p[el.dataset.k] || "";
      el.addEventListener('input', ()=>{
        p[el.dataset.k] = el.value; save();
      });
    });

    updatePageFoot(node, p);
    wrap.appendChild(node);
  });
  updateTotal();
}

function updatePageFoot(node, p){
  const done = p.cells.filter(Boolean).length;
  node.querySelector('.page-done').textContent = done;
}

function updateTotal(){
  const done = state.pages.reduce((s,p)=> s + p.cells.filter(Boolean).length, 0);
  const pct = done/10000*100;
  document.getElementById('totalDone').textContent = done.toLocaleString();
  document.getElementById('totalPct').textContent = pct.toFixed(2)+"%";
  document.getElementById('totalBar').style.width = Math.min(100,pct)+"%";
}

// ---------- actions ----------
function addPage(){
  try{
    state.pages.push(newPage());
    save();
    render();
    // scroll to last page
    setTimeout(()=>{
      const all = document.querySelectorAll('.page');
      if(all.length){
        all[all.length-1].scrollIntoView({behavior:'smooth', block:'start'});
      }
    },80);
    toast("已添加第 "+state.pages.length+" 个 100 小时计划页 ✨");
  }catch(e){
    alert("添加失败：" + e.message + "\n请把这条信息告诉作者。");
    console.error(e);
  }
}
function delPage(btn){
  if(state.pages.length<=1){ toast("至少要保留一页哦"); return; }
  const pageEl = btn.closest('.page');
  const pid = pageEl.dataset.pid;
  if(!confirm("确定删除这一页？所打勾的小时数将一同删除。")) return;
  state.pages = state.pages.filter(p=>p.id!==pid);
  save(); render();
}
function dupPage(btn){
  const pid = btn.closest('.page').dataset.pid;
  const p = state.pages.find(x=>x.id===pid);
  if(!p) return;
  const idx = state.pages.indexOf(p);
  const copy = { ...newPage(), goal:p.goal, rewards:p.rewards, plan:p.plan };
  state.pages.splice(idx+1, 0, copy);
  save(); render();
  toast("已复制目标到新一页");
}
function resetAll(){
  if(!confirm("确定清空所有页面与打勾记录？此操作不可撤销。")) return;
  state = { pages:[ newPage() ], cover:{} };
  save(); render(); toast("已清空");
}
function isSandboxed(){
  // In a sandboxed iframe without allow-downloads, downloads don't work
  try{ return window.self !== window.top; }catch(e){ return true; }
}
function doPrint(){
  if(isSandboxed()){
    alert("⚠️ 沙盒预览窗口不支持调用打印\n\n请先把这个 HTML 文件下载到本地：\n1. 在工作区右键 10000hours.html → 下载\n2. 双击用浏览器打开\n3. 再点「打印」按钮即可正常呼出打印窗口\n\n或者直接打印我帮你生成的 PDF 文件，效果更好。");
    return;
  }
  try{ window.print(); }catch(e){ alert("打印调用失败，请在本地浏览器中打开此文件后重试。"); }
}

// ===== 生成人类可读的文本备份 =====
function generateReadableText(){
  const lines = [];
  const sep = "════════════════════════════════════════════";
  const today = new Date().toISOString().slice(0,10);

  lines.push(sep);
  lines.push("       一万小时计划本 · 数据备份");
  lines.push("       10,000 HOURS JOURNAL BACKUP");
  lines.push(sep);
  lines.push("");
  lines.push("📅 备份日期：" + today);
  lines.push("");
  lines.push("── 我的目标 ──────────────────────");
  lines.push("精进领域：" + (state.skill || "（未填）"));
  lines.push("启程日期：" + (state.startDate || "（未填）"));
  lines.push("坚持理由：" + (state.why || "（未填）"));
  lines.push("");

  // 总览
  const total = (state.logs||[]).reduce((s,l)=>s+(+l.hrs||0),0);
  const days = new Set((state.logs||[]).map(l=>l.date)).size;
  const pct = (total/10000*100).toFixed(2);
  lines.push("── 总进度 ──────────────────────");
  lines.push("累计小时：" + total.toFixed(1) + " / 10,000 小时");
  lines.push("完成进度：" + pct + " %");
  lines.push("打卡天数：" + days + " 天");
  lines.push("");

  // 里程碑
  const MS = [
    {h:20, n:"入门"},{h:100, n:"熟练"},{h:500, n:"上路"},
    {h:1000, n:"优秀"},{h:2500, n:"专业"},{h:5000, n:"精通"},
    {h:7500, n:"权威"},{h:10000, n:"大师"}
  ];
  lines.push("── 里程碑 ──────────────────────");
  MS.forEach(m=>{
    lines.push((total>=m.h?"[√]":"[ ]") + " " + m.h + " 小时  ·  " + m.n);
  });
  lines.push("");

  // 每日打卡记录（按日期倒序）
  lines.push("── 每日打卡记录 ──────────────────");
  if(!(state.logs||[]).length){
    lines.push("（暂无记录）");
  } else {
    const sorted = [...state.logs].sort((a,b)=> b.date.localeCompare(a.date));
    let lastDate = "";
    let dailyTotal = 0;
    sorted.forEach(l=>{
      const hrs = (+l.hrs).toFixed(2);
      const note = l.note || "—";
      lines.push("📅 " + l.date + "  ·  " + hrs + " 小时  ·  " + note);
    });
  }
  lines.push("");

  // 复盘
  if(state.reflection){
    lines.push("── 复盘笔记 ──────────────────────");
    lines.push(state.reflection);
    lines.push("");
  }

  lines.push(sep);
  lines.push("✨ 不积跬步，无以至千里 ✨");
  lines.push("此文件由「一万小时计划本」生成。");
  lines.push("如需恢复数据，请保留对应的 .json 文件并使用「导入」功能。");
  lines.push(sep);

  return lines.join("\n");
}

function exportData(){
  const jsonData = JSON.stringify(state,null,2);
  const textData = generateReadableText();
  const stamp = new Date().toISOString().slice(0,10);
  const jsonName = "10000hours_" + stamp + ".json";
  const textName = "一万小时备份_" + stamp + ".txt";

  if(isSandboxed()){
    showExportModal(jsonData, textData, jsonName, textName);
    return;
  }
  try{
    // 下载 JSON（用于恢复）
    downloadBlob(jsonData, jsonName, "application/json");
    // 下载 TXT（人类可读）
    setTimeout(()=> downloadBlob(textData, textName, "text/plain;charset=utf-8"), 300);
    toast("已导出 2 个文件：JSON（恢复用）+ TXT（可读版）");
  }catch(e){
    showExportModal(jsonData, textData, jsonName, textName);
  }
}

function downloadBlob(content, filename, mime){
  const blob = new Blob([content], {type: mime});
  const url = URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=filename;
  document.body.appendChild(a); a.click();
  setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
}
let __modalData = {json:"", text:"", jsonName:"", textName:""};
function showExportModal(jsonData, textData, jsonName, textName){
  __modalData = {json:jsonData, text:textData, jsonName, textName};
  const old = document.getElementById('exportModal'); if(old) old.remove();
  const wrap = document.createElement('div');
  wrap.id = 'exportModal';
  wrap.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px";
  wrap.innerHTML = `
    <div style="background:var(--paper);border-radius:8px;max-width:680px;width:100%;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.4);overflow:hidden">
      <div style="padding:16px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-weight:800;font-size:15px">导出数据备份</div>
          <div style="font-size:11px;color:var(--ink-soft);margin-top:2px;letter-spacing:1px">2 种格式：📄 可读文本 ＋ 🔧 数据存档</div>
        </div>
        <button onclick="document.getElementById('exportModal').remove()" style="background:none;border:none;font-size:22px;cursor:pointer;color:var(--ink-soft);padding:0 8px">×</button>
      </div>
      <div style="padding:0 22px;border-bottom:1px solid var(--line);display:flex;gap:0">
        <button id="tabText" onclick="switchExportTab('text')" style="background:none;border:none;padding:12px 18px;cursor:pointer;font-size:13px;font-weight:700;color:var(--ink);border-bottom:2px solid var(--ink);font-family:inherit">📄 可读文本 (.txt)</button>
        <button id="tabJson" onclick="switchExportTab('json')" style="background:none;border:none;padding:12px 18px;cursor:pointer;font-size:13px;font-weight:500;color:var(--ink-soft);border-bottom:2px solid transparent;font-family:inherit">🔧 数据存档 (.json)</button>
      </div>
      <div id="tabHint" style="padding:10px 22px 0;font-size:12px;color:var(--ink-soft);line-height:1.5">
        💡 这是<b>给你看的版本</b>，可以直接阅读你的所有打卡记录。建议保存到手机备忘录或微信收藏。
      </div>
      <textarea id="exportText" readonly style="flex:1;margin:10px 22px;padding:12px;border:1px solid var(--line);border-radius:6px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px;line-height:1.6;background:#fff;color:var(--ink);resize:none;min-height:260px;outline:none">${escapeAttr(textData)}</textarea>
      <div style="padding:14px 22px;display:flex;gap:8px;justify-content:space-between;align-items:center;border-top:1px solid var(--line);background:#f3f1e9;flex-wrap:wrap">
        <div style="font-size:11px;color:var(--ink-soft)">📌 沙盒预览中请使用「复制」</div>
        <div style="display:flex;gap:8px">
          <button class="btn ghost" onclick="document.getElementById('exportModal').remove()">关闭</button>
          <button class="btn ghost" onclick="tryDownloadFromModal()">💾 下载文件</button>
          <button class="btn" onclick="copyExportText()">📋 复制全部</button>
        </div>
      </div>
    </div>`;
  document.body.appendChild(wrap);
  setTimeout(()=>{
    const ta = document.getElementById('exportText');
    ta.focus(); ta.select();
  },50);
}
function switchExportTab(which){
  const ta = document.getElementById('exportText');
  const tabText = document.getElementById('tabText');
  const tabJson = document.getElementById('tabJson');
  const hint = document.getElementById('tabHint');
  ta.dataset.kind = which;
  if(which==='text'){
    ta.value = __modalData.text;
    tabText.style.color='var(--ink)'; tabText.style.fontWeight='700'; tabText.style.borderBottomColor='var(--ink)';
    tabJson.style.color='var(--ink-soft)'; tabJson.style.fontWeight='500'; tabJson.style.borderBottomColor='transparent';
    hint.innerHTML = '💡 这是<b>给你看的版本</b>，可以直接阅读所有打卡记录。建议保存到手机备忘录或微信收藏。';
  } else {
    ta.value = __modalData.json;
    tabJson.style.color='var(--ink)'; tabJson.style.fontWeight='700'; tabJson.style.borderBottomColor='var(--ink)';
    tabText.style.color='var(--ink-soft)'; tabText.style.fontWeight='500'; tabText.style.borderBottomColor='transparent';
    hint.innerHTML = '💡 这是<b>给程序看的存档</b>，看起来像乱码但很重要。换设备后用「导入」按钮选这个文件即可<b>完美恢复</b>所有打卡。';
  }
  setTimeout(()=>{ta.focus(); ta.select();},20);
}
function escapeAttr(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function copyExportText(){
  const ta = document.getElementById('exportText'); if(!ta) return;
  ta.select(); ta.setSelectionRange(0,99999999);
  let ok=false;
  try{ ok = document.execCommand('copy'); }catch(e){}
  if(navigator.clipboard && !ok){
    navigator.clipboard.writeText(ta.value).then(()=>toast("已复制到剪贴板 ✓")).catch(()=>toast("请手动 Ctrl/Cmd+C 复制"));
    return;
  }
  toast(ok?"已复制到剪贴板 ✓":"请手动 Ctrl/Cmd+C 复制");
}
function tryDownloadFromModal(){
  const ta = document.getElementById('exportText'); if(!ta) return;
  const kind = ta.dataset.kind || 'text';
  const filename = kind==='json' ? __modalData.jsonName : __modalData.textName;
  const mime = kind==='json' ? "application/json" : "text/plain;charset=utf-8";
  try{
    const blob = new Blob([ta.value],{type:mime});
    const url = URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download=filename; a.target="_blank"; a.rel="noopener";
    document.body.appendChild(a); a.click();
    setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
    toast("若未弹出下载，请使用复制方式");
  }catch(e){ toast("下载失败，请使用复制方式"); }
}
function importData(e){
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=ev=>{
    try{ state=JSON.parse(ev.target.result); save(); render(); toast("导入成功"); }
    catch{ toast("文件格式错误"); }
  };
  r.readAsText(f); e.target.value="";
}
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._tm); t._tm=setTimeout(()=>t.classList.remove('show'),1600);
}

// init
load();
render();
</script>
